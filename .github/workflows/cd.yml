name: CD

on:
  release:
    types: [published]

jobs:
  build-test-image:
    name: Build Test Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f Dockerfile.test -t getting-started-app-test .

      - name: Save test image
        run: |
          mkdir -p /tmp/docker-image
          docker save getting-started-app-test -o /tmp/docker-image/getting-started-app-test.tar

      - name: Upload test image
        uses: actions/upload-artifact@v4
        with:
          name: test-image
          path: /tmp/docker-image/getting-started-app-test.tar
          retention-days: 1

  frontend-lint:
    name: Frontend Lint
    needs: build-test-image
    runs-on: ubuntu-latest

    steps:
      - name: Download test image
        uses: actions/download-artifact@v4
        with:
          name: test-image
          path: /tmp/docker-image

      - name: Load test image
        run: docker load -i /tmp/docker-image/getting-started-app-test.tar

      - name: Run frontend lint
        run: docker run --rm getting-started-app-test npm run lint:frontend

  mock-tests:
    name: Mock Tests
    needs: build-test-image
    runs-on: ubuntu-latest

    steps:
      - name: Download test image
        uses: actions/download-artifact@v4
        with:
          name: test-image
          path: /tmp/docker-image

      - name: Load test image
        run: docker load -i /tmp/docker-image/getting-started-app-test.tar

      - name: Run tests
        run: docker run --rm getting-started-app-test npm test

  build-and-publish-prod-image:
    name: Build and Publish Production Image
    needs:
      - frontend-lint
      - mock-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build production image
        run: |
          docker build -f dockerfile \
            -t "$IMAGE_NAME:${{ github.event.release.tag_name }}" \
            -t "$IMAGE_NAME:latest" .

      - name: Push production image
        run: |
          docker push "$IMAGE_NAME:${{ github.event.release.tag_name }}"
          docker push "$IMAGE_NAME:latest"
